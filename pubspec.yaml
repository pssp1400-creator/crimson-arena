name: crimson_arena
description: Crimson Arena - Skill-Based Custom Room Matches
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.1
  firebase_database: ^10.4.9
  firebase_auth: ^4.19.6
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.1.2
  http: ^1.2.1
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  screenshot: ^2.3.0
  home_widget: ^0.6.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/qr.png
